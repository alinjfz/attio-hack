<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" fill="none">
  <rect width="1600" height="900" fill="#fafafa"/>
  <rect x="60" y="60" width="1480" height="780" rx="20" stroke="#d4d4d8" stroke-width="2" stroke-dasharray="14 10" fill="#f4f4f5"/>
  <!-- Attio hub -->
  <rect x="680" y="340" width="240" height="100" rx="12" fill="#0f172a"/>
  <text x="800" y="395" text-anchor="middle" fill="#fff" font-family="system-ui,sans-serif" font-size="18" font-weight="600">Attio CRM</text>
  <!-- Input -->
  <rect x="120" y="360" width="180" height="60" rx="10" fill="#fff" stroke="#a1a1aa" stroke-width="2"/>
  <text x="210" y="395" text-anchor="middle" fill="#52525b" font-family="system-ui,sans-serif" font-size="14">CV + Role</text>
  <!-- Pipeline -->
  <rect x="420" y="360" width="180" height="60" rx="10" fill="#fff" stroke="#a1a1aa" stroke-width="2"/>
  <text x="510" y="395" text-anchor="middle" fill="#52525b" font-family="system-ui,sans-serif" font-size="14">Fit Scoring</text>
  <rect x="1000" y="360" width="180" height="60" rx="10" fill="#fff" stroke="#a1a1aa" stroke-width="2"/>
  <text x="1090" y="395" text-anchor="middle" fill="#52525b" font-family="system-ui,sans-serif" font-size="14">Drafts</text>
  <rect x="1220" y="360" width="180" height="60" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="1310" y="395" text-anchor="middle" fill="#92400e" font-family="system-ui,sans-serif" font-size="14">Approve</text>
  <!-- n8n branch -->
  <rect x="680" y="560" width="240" height="80" rx="10" fill="#fff" stroke="#a1a1aa" stroke-width="2" stroke-dasharray="8 6"/>
  <text x="800" y="605" text-anchor="middle" fill="#71717a" font-family="system-ui,sans-serif" font-size="14">n8n webhook path</text>
  <!-- Arrows -->
  <path d="M300 390h100M420 390h-20M920 390h60M1180 390h20" stroke="#71717a" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M800 440v100" stroke="#71717a" stroke-width="2" stroke-dasharray="6 4"/>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#71717a"/>
    </marker>
  </defs>
  <text x="800" y="780" text-anchor="middle" fill="#71717a" font-family="system-ui,sans-serif" font-size="24" font-weight="500">architecture.png  1600×900</text>
  <text x="800" y="820" text-anchor="middle" fill="#a1a1aa" font-family="system-ui,sans-serif" font-size="18">Isometric pipeline infographic</text>
</svg>
