query GetCandidateContext($recordId: String!) {
  person(id: $recordId) {
    name {
      full_name
    }
    cv_text: attribute(slug: "cv_text") {
      __typename
      ... on TextValue {
        value
      }
    }
    linkedin_url: attribute(slug: "linkedin_url") {
      __typename
      ... on TextValue {
        value
      }
    }
    role: attribute(slug: "role") {
      __typename
      ... on RecordReferenceValue {
        value {
          id
          description: attribute(slug: "description") {
            __typename
            ... on TextValue {
              value
            }
          }
          title: attribute(slug: "title") {
            __typename
            ... on TextValue {
              value
            }
          }
        }
      }
    }
    fit_score: attribute(slug: "fit_score") {
      __typename
      ... on NumberValue {
        value
      }
    }
    fit_tier: attribute(slug: "fit_tier") {
      __typename
      ... on SelectValue {
        value {
          title
        }
      }
    }
    two_liner: attribute(slug: "two_liner") {
      __typename
      ... on TextValue {
        value
      }
    }
    audio_summary_script: attribute(slug: "audio_summary_script") {
      __typename
      ... on TextValue {
        value
      }
    }
  }
}
